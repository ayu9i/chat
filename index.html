<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CASE CLOSED | CONAN HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Kanit:wght@200&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #d4af37; /* สีทองโคนัน */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            text-align: center;
        }

        .seal {
            border: 2px solid #d4af37;
            padding: 40px;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: pulse 2s infinite;
        }

        h1 {
            letter-spacing: 15px;
            margin: 10px 0;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        p {
            font-family: 'Kanit', sans-serif;
            opacity: 0.5;
            letter-spacing: 2px;
            font-weight: 200;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="seal">404</div>
    <h1>CASE CLOSED</h1>
    <p>ระบบสุ่มคดีถูกระงับการใช้งานถาวร</p>
    <p style="font-size: 0.7rem; margin-top: 50px;">-- THE END OF INVESTIGATION --</p>

    <script>
        // ล้างฐานข้อมูลในเครื่องผู้ใช้ทิ้งทันทีเมื่อเปิดหน้านี้
        localStorage.clear();
        console.log("System Terminated: All local history cleared.");
    </script>

</body>
</html>
