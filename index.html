<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONAN OMEGA: THE 1000+ EDITION</title>
    
    <style>
        /* [CSS SECTION: VISUAL ARCHITECTURE]
           ส่วนนี้เราใช้จัดการหน้าตา และ Animation ที่ซับซ้อน
        */
        :root {
            --danger: #ff0000;
            --success: #00ff00;
            --gold: #ffd700;
            --bg: #010101;
            --panel: #0d0d0d;
            --neon-blue: #00f2ff;
            --wire-shadow: rgba(0,0,0,0.9);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Segoe UI', 'Tahoma', 'Geneva', 'Verdana', sans-serif; 
        }

        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* [ANIMATION: BACKGROUND MATRIX FLOW] */
        #bg-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            opacity: 0.2; 
        }

        /* [LAYOUT: MAIN DEVICE FRAME] */
        #app-frame {
            background: var(--panel);
            border: 4px solid #222;
            border-radius: 25px;
            padding: 25px;
            width: 95%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 15px var(--border-glow);
            z-index: 10;
            transition: transform 0.1s ease;
        }

        /* [UI: HEADER & NETWORK STATUS] */
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.7rem; 
            color: var(--neon-blue); 
            margin-bottom: 15px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 8px; 
            font-family: 'Courier New', monospace;
        }

        /* [UI: DIGITAL TIMER DISPLAY] */
        .display-unit {
            background: #000;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(255,0,0,0.15);
            position: relative;
        }

        .timer-val { 
            font-size: 4rem; 
            color: var(--danger); 
            text-shadow: 0 0 25px var(--danger); 
            font-weight: bold; 
            margin: 0; 
            font-family: 'Orbitron', 'Courier New', monospace;
        }

        /* [UI: WIRE SYSTEM] */
        .wire-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin-bottom: 25px; 
        }

        .wire { 
            height: 95px; 
            border-radius: 10px; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: inset -6px 0 12px var(--wire-shadow); 
        }

        .wire::after {
            content: ""; 
            position: absolute; 
            top: -100%; 
            left: 0; 
            width: 100%; 
            height: 40%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent); 
            animation: flow 1s linear infinite;
        }

        @keyframes flow { from { top: -100%; } to { top: 100%; } }

        .wire.cut { 
            height: 25px; 
            background: #111 !important; 
            opacity: 0.4; 
            transform: translateY(20px); 
            box-shadow: none; 
            cursor: default; 
        }

        /* [UI: BUTTONS & INTERACTABLES] */
        .btn-group { display: flex; gap: 10px; }
        
        button.action {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            color: #fff;
            border: 1px solid #444;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        button.action:hover { 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 15px var(--border-glow); 
        }

        button.danger { 
            background: linear-gradient(145deg, #ff0000, #990000); 
            border: none; 
            color: white; 
        }

        /* [LOCK SCREEN & OVERLAYS] */
        .modal {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.98); 
            z-index: 100; 
            border-radius: 20px; 
            padding: 30px;
            border: 2px solid var(--neon-blue); 
            overflow-y: auto;
        }

        /* [SYSTEM RECOVERY INPUT] */
        #recover-key {
            background: #000;
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* [LANG & DIFFICULTY SELECTORS] */
        .selector-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sel-btn {
            background: #222;
            border: 1px solid #444;
            color: #888;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .sel-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #333;
        }

        /* [EFFECTS: SHAKE & PARTICLES] */
        .shake { animation: shake-screen 0.1s infinite; }
        @keyframes shake-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-frame">
        <div class="status-bar">
            <span id="ping-stat">SIGNAL: CONNECTED</span>
            <span id="enc-stat">ENC: OMEGA-256</span>
        </div>

        <div class="selector-box" id="lang-switch">
            <button class="sel-btn" onclick="game.setLang('th')">THAI</button>
            <button class="sel-btn active" onclick="game.setLang('en')">ENGLISH</button>
            <button class="sel-btn" onclick="game.setLang('jp')">JAPANESE</button>
        </div>

        <div id="view-setup" class="page active">
            <div class="display-unit">
                <h2 id="txt-title" style="color:var(--gold); margin:0;">BOMB SYSTEM</h2>
                <p id="txt-subtitle" style="font-size:0.7rem; color:#666;">AUTHORIZATION REQUIRED</p>
            </div>
            
            <p id="txt-diff-label" style="text-align:center; font-size:0.8rem; margin-bottom:10px;">LEVEL:</p>
            <div class="selector-box">
                <button class="sel-btn" id="d1" onclick="game.setDiff(1.0, 'd1')">EASY</button>
                <button class="sel-btn active" id="d2" onclick="game.setDiff(1.8, 'd2')">NORMAL</button>
                <button class="sel-btn" id="d3" onclick="game.setDiff(3.5, 'd3')">HARD</button>
            </div>

            <button class="action danger" onclick="game.initGame()" id="txt-btn-start">ARM DEVICE</button>
        </div>

        <div id="view-mission" class="page" style="display:none;">
            <div class="display-unit">
                <p class="timer-val" id="timer-display">00:30</p>
                <p id="txt-progress" style="color:var(--gold); font-size:0.8rem; margin:10px 0;">WIRES: 0 / 10</p>
            </div>
            
            <div class="wire-grid" id="wire-container">
                </div>

            <div class="btn-group">
                <button class="action" onclick="game.openModal('manual')" id="txt-btn-manual">MANUAL</button>
                <button class="action" onclick="game.openModal('stats')" id="txt-btn-stats">LOGS</button>
            </div>
        </div>

        <div id="view-lock" class="page" style="display:none; text-align:center;">
            <div class="display-unit">
                <h1 id="lock-status" style="font-size:3rem; margin:0;"></h1>
            </div>
            <p id="txt-lock-msg" style="color:#888; margin-bottom:20px;">SYSTEM HAS BEEN PERMANENTLY LOCKED</p>
            <input type="text" id="recover-key" placeholder="RECOVERY CODE">
            <button class="action danger" onclick="game.rebootSystem()" id="txt-btn-reboot">RESTORE SYSTEM</button>
        </div>

        <div id="modal" class="modal">
            <div id="modal-content" style="line-height: 1.6;"></div>
            <button class="action" onclick="game.closeModal()" id="txt-btn-close" style="margin-top:30px;">DISMISS</button>
        </div>
    </div>

    <script>
        /*
           [SCRIPT SECTION: THE OMEGA ENGINE]
           นี่คือสมองของระบบ จัดการทั้ง Logic, Sound, Animation และ Localization
        */
        const game = (() => {
            
            // [1] DATABASE: LOCALIZATION
            const langPack = {
                th: {
                    title: "ระบบระเบิดโคนัน", sub: "กรุณายืนยันสิทธิ์เข้าถึง", diff: "ระดับความตึง:",
                    start: "เปิดใช้งานระเบิด", manual: "คู่มือการกู้", stats: "ประวัติการกู้",
                    prog: "สายไฟที่ตัดแล้ว: ", reboot: "คืนค่าระบบ", close: "ปิดหน้าต่าง",
                    boom: "ตูมมม! 💥", clear: "ปลอดภัย! 🎖️", error: "รหัสกู้คืนไม่ถูกต้อง!",
                    log_title: "ประวัติภารกิจ", manual_title: "วิเคราะห์วงจร",
                    wires: ["แดง", "น้ำเงิน", "เขียว", "เหลือง", "ม่วง", "ส้ม", "ขาว", "เทาดำ", "เขียวมินต์", "แสด"]
                },
                en: {
                    title: "CONAN BOMB OMEGA", sub: "AUTHORIZATION REQUIRED", diff: "DIFFICULTY:",
                    start: "ARM DEVICE", manual: "MANUAL", stats: "MISSION LOGS",
                    prog: "WIRES DEFUSED: ", reboot: "RESTORE SYSTEM", close: "DISMISS",
                    boom: "BOOM! 💥", clear: "CLEAR! 🎖️", error: "INVALID RECOVERY KEY!",
                    log_title: "MISSION HISTORY", manual_title: "CIRCUIT ANALYSIS",
                    wires: ["Red", "Blue", "Green", "Yellow", "Purple", "Orange", "White", "Slate", "Mint", "Amber"]
                },
                jp: {
                    title: "コナン爆弾システム", sub: "承認が必要です", diff: "難易度:",
                    start: "爆弾を作動させる", manual: "マニュアル", stats: "履歴",
                    prog: "解除された線: ", reboot: "システム復旧", close: "閉じる",
                    boom: "ドカーン! 💥", clear: "解除成功! 🎖️", error: "コードが正しくありません!",
                    log_title: "ミッション履歴", manual_title: "回路分析",
                    wires: ["赤", "青", "緑", "黄", "紫", "橙", "白", "灰色", "ミント", "琥珀色"]
                }
            };

            // [2] STATE MANAGEMENT
            let currentLang = 'en';
            let state = {
                active: false,
                sequence: [],
                step: 0,
                timeLeft: 30,
                difficulty: 1.8,
                timer: null,
                history: []
            };

            // [3] AUDIO ENGINE
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playSound = (freq, dur, type = 'sine') => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                setTimeout(() => osc.stop(), dur);
            };

            // [4] CORE FUNCTIONS
            return {
                setLang: (lang) => {
                    currentLang = lang;
                    document.querySelectorAll('#lang-switch button').forEach(b => {
                        b.classList.toggle('active', b.innerText.toLowerCase().includes(lang));
                    });
                    game.updateUI();
                },

                updateUI: () => {
                    const l = langPack[currentLang];
                    document.getElementById('txt-title').innerText = l.title;
                    document.getElementById('txt-subtitle').innerText = l.sub;
                    document.getElementById('txt-diff-label').innerText = l.diff;
                    document.getElementById('txt-btn-start').innerText = l.start;
                    document.getElementById('txt-btn-manual').innerText = l.manual;
                    document.getElementById('txt-btn-stats').innerText = l.stats;
                    document.getElementById('txt-btn-reboot').innerText = l.reboot;
                    document.getElementById('txt-btn-close').innerText = l.close;
                    document.getElementById('txt-progress').innerText = l.prog + state.step + " / 10";
                },

                setDiff: (val, btnId) => {
                    state.difficulty = val;
                    document.querySelectorAll('.page button').forEach(b => b.classList.remove('active'));
                    document.getElementById(btnId).classList.add('active');
                    playSound(440, 50);
                },

                initGame: () => {
                    state.active = true;
                    state.step = 0;
                    state.timeLeft = 30;
                    state.sequence = Array.from({length: 10}, (_, i) => i).sort(() => Math.random() - 0.5);
                    
                    document.getElementById('view-setup').style.display = 'none';
                    document.getElementById('view-mission').style.display = 'block';
                    
                    const container = document.getElementById('wire-container');
                    container.innerHTML = "";
                    for(let i=0; i<10; i++) {
                        container.innerHTML += `<div class="wire w${i}" id="wire-${i}" onclick="game.cutWire(${i})"></div>`;
                    }
                    
                    state.timer = setInterval(() => {
                        state.timeLeft -= (0.1 * state.difficulty);
                        const s = Math.max(0, Math.ceil(state.timeLeft));
                        document.getElementById('timer-display').innerText = `00:${s < 10 ? '0'+s : s}`;
                        
                        if(s <= 5) {
                            document.getElementById('app-frame').classList.add('shake');
                            playSound(1200, 30, 'square');
                        }

                        if(state.timeLeft <= 0) game.endGame('dead');
                    }, 100);
                    
                    game.updateUI();
                },

                cutWire: (id) => {
                    const el = document.getElementById(`wire-${id}`);
                    if(el.classList.contains('cut') || !state.active) return;
                    
                    if(id === state.sequence[state.step]) {
                        el.classList.add('cut');
                        state.step++;
                        playSound(800, 100);
                        game.updateUI();
                        if(state.step === 10) game.endGame('won');
                    } else {
                        game.endGame('dead');
                    }
                },

                endGame: (result) => {
                    state.active = false;
                    clearInterval(state.timer);
                    document.getElementById('app-frame').classList.remove('shake');
                    
                    localStorage.setItem('conan_state', result);
                    game.showLockView(result);
                },

                showLockView: (res) => {
                    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
                    document.getElementById('view-lock').style.display = 'block';
                    
                    const status = document.getElementById('lock-status');
                    status.innerText = res === 'dead' ? langPack[currentLang].boom : langPack[currentLang].clear;
                    status.style.color = res === 'dead' ? 'red' : 'lime';
                },

                openModal: (type) => {
                    const modal = document.getElementById('modal');
                    const content = document.getElementById('modal-content');
                    modal.style.display = 'block';
                    
                    if(type === 'manual') {
                        content.innerHTML = `<h3>[ ${langPack[currentLang].manual_title} ]</h3>
                        <p>SEQUENCE ANALYSIS:</p>
                        <p style="color:var(--neon-blue); font-weight:bold;">
                        ${state.sequence.map(idx => langPack[currentLang].wires[idx]).join(' > ')}
                        </p>`;
                    } else {
                        content.innerHTML = `<h3>[ ${langPack[currentLang].log_title} ]</h3>
                        <p>ID: #4869-APTX<br>STATUS: ENCRYPTED<br>RANK: DETECTIVE</p>`;
                    }
                },

                closeModal: () => document.getElementById('modal').style.display = 'none',

                rebootSystem: () => {
                    if(document.getElementById('recover-key').value.toLowerCase() === 'gurabud') {
                        localStorage.removeItem('conan_state');
                        location.reload();
                    } else {
                        alert(langPack[currentLang].error);
                        playSound(100, 500, 'sawtooth');
                    }
                }
            };
        })();

        // [5] MATRIX BACKGROUND SIMULATION
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width / 20);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = '15px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 20, drops[i] * 20);
                if(drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // [6] INITIALIZATION
        window.onload = () => {
            const saved = localStorage.getItem('conan_state');
            if(saved) game.showLockView(saved);
            game.setLang('en');
        };
    </script>
</body>
</html>
