<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONAN OMEGA: TITAN PROTOCOL 💣</title>
    
    <style>
        /* [CSS ARCHITECTURE: THE VISUAL ENGINE]
           เราใช้ CSS Variables ในการควบคุม Theme ทั้งหมดเพื่อให้ระบบมีความยืดหยุ่นสูงสุด
        */
        :root {
            --danger: #ff0000;
            --danger-glow: rgba(255, 0, 0, 0.7);
            --success: #00ff00;
            --success-glow: rgba(0, 255, 0, 0.5);
            --gold: #ffd700;
            --bg-deep: #020205;
            --bg-panel: rgba(13, 13, 15, 0.95);
            --neon-blue: #00f2ff;
            --wire-shadow: rgba(0, 0, 0, 0.9);
            --interface-border: #1a1a1f;
            --font-main: 'Segoe UI', Roboto, sans-serif;
            --font-digital: 'Orbitron', 'Courier New', monospace;
        }

        /* SYSTEM RESET & BASE STYLES */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            scrollbar-width: none; /* Hide scrollbar for clean UI */
        }

        body { 
            background-color: var(--bg-deep); 
            color: #ffffff; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: var(--font-main);
        }

        /* ANIMATED NEURAL NETWORK BACKGROUND */
        #neural-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            opacity: 0.4; 
        }

        /* MAIN MAINFRAME CONTAINER */
        #mainframe {
            background: var(--bg-panel);
            border: 2px solid var(--interface-border);
            border-radius: 35px;
            padding: 35px;
            width: 92%;
            max-width: 580px;
            position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,1), inset 0 0 20px rgba(0, 242, 255, 0.08);
            z-index: 10;
            backdrop-filter: blur(15px);
            transition: transform 0.1s ease-out;
        }

        /* TELEMETRY & STATUS BAR */
        .telemetry-bar { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.7rem; 
            color: var(--neon-blue); 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--interface-border); 
            padding-bottom: 12px; 
            letter-spacing: 2px;
            font-family: var(--font-digital);
        }

        /* CENTRAL DISPLAY CORE */
        .display-core {
            background: #000;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 35px;
            text-align: center;
            box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.12);
            position: relative;
            overflow: hidden;
        }

        .timer-readout { 
            font-size: 5rem; 
            color: var(--danger); 
            text-shadow: 0 0 35px var(--danger-glow); 
            font-weight: 900; 
            margin: 0; 
            font-family: var(--font-digital);
            letter-spacing: -3px;
        }

        /* PROGRESS FILLER SYSTEM */
        .progress-track {
            height: 4px;
            background: #111;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), #fff);
            box-shadow: 0 0 10px var(--gold);
            transition: width 0.3s linear;
        }

        /* WIRE MATRIX ARCHITECTURE */
        .wire-matrix { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin-bottom: 35px; 
        }

        .wire-unit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wire-cable { 
            width: 100%;
            height: 110px; 
            border-radius: 15px; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            box-shadow: inset -10px 0 18px var(--wire-shadow), 0 8px 20px rgba(0,0,0,0.6); 
        }

        /* ELECTRICITY ANIMATION */
        .wire-cable::after {
            content: ""; 
            position: absolute; 
            top: -100%; 
            left: 0; 
            width: 100%; 
            height: 60%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45), transparent); 
            animation: electricity 1.2s linear infinite;
        }

        @keyframes electricity { from { top: -100%; } to { top: 100%; } }

        .wire-cable.severed { 
            height: 30px; 
            background: #050505 !important; 
            opacity: 0.25; 
            transform: translateY(25px) scale(0.92); 
            box-shadow: none; 
            cursor: default; 
        }

        /* INTERFACE CONTROL ARRAY */
        .control-array { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        button.cmd {
            background: linear-gradient(180deg, #1a1a1f 0%, #0d0d0f 100%);
            color: #aaa;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.8rem;
            transition: 0.3s all;
            letter-spacing: 1.5px;
        }

        button.cmd:hover { 
            border-color: var(--neon-blue); 
            color: #fff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.25); 
        }

        button.cmd.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #1a1a15;
        }

        button.cmd-danger { 
            background: linear-gradient(180deg, #ff0000 0%, #800000 100%); 
            border: none; 
            color: white; 
            font-size: 1.1rem;
            box-shadow: 0 12px 25px rgba(255,0,0,0.25);
            grid-column: span 2;
        }

        /* INPUT PROTOCOLS */
        .input-wrap { margin-bottom: 25px; text-align: left; }
        .input-wrap label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        
        input.titan-field {
            background: #000;
            border: 2px solid #222;
            color: var(--gold);
            padding: 18px;
            width: 100%;
            font-size: 1.3rem;
            border-radius: 15px;
            font-family: var(--font-digital);
            text-align: center;
            transition: 0.3s;
        }

        input.titan-field:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        /* OVERLAY SYSTEMS */
        .overlay {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(1, 1, 2, 0.99); 
            z-index: 100; 
            border-radius: 33px; 
            padding: 45px;
            border: 2px solid var(--neon-blue); 
            animation: bootIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes bootIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* EMERGENCY SHAKE EFFECT */
        .shake-active { animation: titan-shake 0.1s infinite; }
        @keyframes titan-shake {
            0% { transform: translate(3px, 3px); }
            33% { transform: translate(-3px, -3px); }
            66% { transform: translate(3px, -3px); }
            100% { transform: translate(-3px, 3px); }
        }

        /* WIRE COLOR DATASETS */
        .w-red { background: #ff3b30; } .w-blue { background: #007aff; }
        .w-green { background: #34c759; } .w-yellow { background: #ffcc00; }
        .w-purple { background: #af52de; } .w-orange { background: #ff9500; }
        .w-white { background: #f2f2f7; } .w-grey { background: #48484a; }
        .w-teal { background: #5ac8fa; } .w-brown { background: #a2845e; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div id="mainframe">
        <div class="telemetry-bar">
            <span id="stat-link">OS: OMEGA v3.8</span>
            <span id="stat-ping">PING: -- MS</span>
            <span id="stat-node">DEVICE: AYU-GZ</span>
        </div>

        <div id="view-setup" class="page active">
            <div class="display-core">
                <h2 style="color:var(--gold); margin:0; letter-spacing:4px; font-family: var(--font-digital);">BOMB DESIGNER</h2>
                <p style="font-size:0.65rem; color:#555; margin-top:8px; text-transform:uppercase;">Configure Lethal Parameters</p>
            </div>
            
            <div class="input-wrap">
                <label>Deployment Timer (Seconds):</label>
                <input type="number" id="input-timer" value="45" min="5" max="999" class="titan-field">
            </div>

            <div class="input-wrap">
                <label>Lethality Level:</label>
                <div style="display:flex; gap:12px;">
                    <button class="cmd" id="lv-1" onclick="engine.setLethal(1.0, 'lv-1')">ROOKIE</button>
                    <button class="cmd active" id="lv-2" onclick="engine.setLethal(1.8, 'lv-2')">ELITE</button>
                    <button class="cmd" id="lv-3" onclick="engine.setLethal(3.5, 'lv-3')">GHOST</button>
                </div>
            </div>

            <button class="cmd cmd-danger" onclick="engine.armSystem()">ARM PROTOCOL</button>
        </div>

        <div id="view-mission" class="page" style="display:none;">
            <div class="display-core">
                <p class="timer-readout" id="timer-val">00:00</p>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                <p id="mission-status" style="color:var(--gold); font-size:0.75rem; margin-top:15px; letter-spacing:1px;">STABILIZING CIRCUIT...</p>
            </div>
            
            <div class="wire-matrix" id="wire-grid">
                </div>

            <div class="control-array">
                <button class="cmd" onclick="engine.openOverlay('analysis')">ANALYSIS</button>
                <button class="cmd" onclick="engine.openOverlay('log')">MISSION LOG</button>
            </div>
        </div>

        <div id="view-lock" class="page" style="display:none; text-align:center;">
            <div class="display-core">
                <h1 id="lock-header" style="font-size:3.8rem; margin:0; line-height:1;"></h1>
            </div>
            <p style="color:#666; font-size:0.8rem; margin-top:20px;">SYSTEM ENCRYPTION EXPIRED. OVERRIDE REQUIRED.</p>
            <input type="text" id="override-key" placeholder="ADMIN CODE" class="titan-field" style="border-color:var(--danger); margin-top:15px;">
            <button class="cmd cmd-danger" onclick="engine.systemReboot()" style="margin-top:20px; width:100%;">SYSTEM REBOOT</button>
        </div>

        <div id="overlay-modal" class="overlay">
            <div id="overlay-body"></div>
            <button class="cmd" onclick="engine.closeOverlay()" style="width:100%; margin-top:35px; border-color:var(--gold);">RESUME MISSION</button>
        </div>
    </div>

    <script>
        /**
         * =====================================================================
         * THE TITAN PROTOCOL ENGINE (REACTIVE LOGIC CORE)
         * =====================================================================
         * นี่คือหัวใจหลักที่คุมทุกอย่าง ทั้งเวลา คะแนน และความปลอดภัย
         */
        const engine = (() => {
            
            // SYSTEM SETTINGS
            const CONFIG = {
                RECOVERY: "gurabud",
                STORAGE: "ayu_titan_v3",
                COLORS: ['red', 'blue', 'green', 'yellow', 'purple', 'orange', 'white', 'grey', 'teal', 'brown']
            };

            // LIVE STATE
            let state = {
                active: false,
                order: [],
                current: 0,
                time: 45,
                maxTime: 45,
                lethality: 1.8,
                loop: null
            };

            // AUDIO ENGINE (SINEWAVE SYNTHESIZER)
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const beep = (f, d, t = 'sine', v = 0.08) => {
                const o = audio.createOscillator(), g = audio.createGain();
                o.type = t; o.frequency.value = f;
                g.gain.setValueAtTime(v, audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d/1000);
                o.connect(g); g.connect(audio.destination);
                o.start(); o.stop(audio.currentTime + d/1000);
            };

            const dom = id => document.getElementById(id);

            return {
                setLethal: (v, id) => {
                    state.lethality = v;
                    document.querySelectorAll('#view-setup .cmd').forEach(b => b.classList.remove('active'));
                    dom(id).classList.add('active');
                    beep(523, 60);
                },

                armSystem: () => {
                    // 1. Fetch Custom Parameters
                    const customT = parseInt(dom('input-timer').value);
                    state.time = isNaN(customT) || customT < 5 ? 45 : customT;
                    state.maxTime = state.time;
                    
                    // 2. Build Sequence
                    state.active = true;
                    state.current = 0;
                    state.order = Array.from({length: 10}, (_, i) => i).sort(() => Math.random() - 0.5);

                    // 3. UI Phase Shift
                    dom('view-setup').style.display = 'none';
                    dom('view-mission').style.display = 'block';

                    // 4. Inject Wires
                    const grid = dom('wire-grid');
                    grid.innerHTML = "";
                    state.order.forEach((v, idx) => {
                        grid.innerHTML += `
                            <div class="wire-unit">
                                <div class="wire-cable w-${CONFIG.COLORS[idx]}" id="wire-${idx}" onclick="engine.cut(${idx})"></div>
                            </div>`;
                    });

                    // 5. Start Core Lifecycle
                    engine.startTick();
                    beep(880, 250, 'triangle');
                    
                    // Update Ping for realism
                    dom('stat-ping').innerText = `PING: ${Math.floor(Math.random()*20 + 20)} MS`;
                },

                startTick: () => {
                    state.loop = setInterval(() => {
                        state.time -= (0.1 * state.lethality);
                        const display = Math.max(0, Math.ceil(state.time));
                        
                        // Update Readout UI
                        dom('timer-val').innerText = `00:${display < 10 ? '0'+display : display}`;
                        
                        // Progress Bar Logic
                        const p = ((state.maxTime - state.time) / state.maxTime) * 100;
                        dom('progress-bar').style.width = `${p}%`;

                        // Critical Conditions
                        if(display <= 8) {
                            dom('mainframe').classList.add('shake-active');
                            if(Math.floor(state.time * 10) % 4 === 0) beep(1600, 30, 'square');
                        }

                        if(state.time <= 0) engine.terminate('dead');
                    }, 100);
                },

                cut: (id) => {
                    if(!state.active) return;
                    const w = dom(`wire-${id}`);
                    if(w.classList.contains('severed')) return;

                    if(id === state.order[state.current]) {
                        w.classList.add('severed');
                        state.current++;
                        dom('mission-status').innerText = `NODE ${state.current} SECURED.`;
                        beep(1000 + (state.current * 100), 100);
                        if(state.current === 10) engine.terminate('won');
                    } else {
                        engine.terminate('dead');
                    }
                },

                terminate: (res) => {
                    state.active = false;
                    clearInterval(state.loop);
                    dom('mainframe').classList.remove('shake-active');
                    localStorage.setItem(CONFIG.STORAGE, res);
                    
                    if(res === 'dead') beep(150, 1200, 'sawtooth', 0.2);
                    setTimeout(() => engine.renderLock(res), 700);
                },

                renderLock: (res) => {
                    document.querySelectorAll('.page').forEach(v => v.style.display = 'none');
                    dom('view-lock').style.display = 'block';
                    
                    const head = dom('lock-header');
                    head.innerText = res === 'dead' ? "BOOM! 💥" : "CLEAR! 🎖️";
                    head.style.color = res === 'dead' ? 'var(--danger)' : 'var(--success)';
                },

                openOverlay: (type) => {
                    const m = dom('overlay-modal');
                    const b = dom('overlay-body');
                    m.style.display = 'block';
                    
                    if(type === 'analysis') {
                        b.innerHTML = `
                            <h2 style="color:var(--gold); font-family:var(--font-digital);">CIRCUIT DATA</h2>
                            <p style="font-size:0.75rem; color:#888; border-left: 2px solid var(--neon-blue); padding-left:10px;">
                                Sequence has been intercepted. Use with caution.
                            </p>
                            <div style="background:#050505; padding:20px; border-radius:15px; border:1px dashed #333; line-height:1.8;">
                                ${state.order.map((v, i) => `<span style="color:${CONFIG.COLORS[v]}">#${i+1}: ${CONFIG.COLORS[v].toUpperCase()}</span>`).join('<br>')}
                            </div>`;
                    } else {
                        b.innerHTML = `
                            <h2 style="font-family:var(--font-digital);">AGENT PROFILE</h2>
                            <div style="text-align:left; font-size:0.8rem; color:#aaa;">
                                <p>NAME: Ayu Game Zone</p>
                                <p>RANK: ${state.current > 5 ? 'Senior Detective' : 'Rookie'}</p>
                                <p>SUCCESS RATE: 98.4%</p>
                                <p>LOCATION: TAK PROVINCE, THAILAND</p>
                            </div>`;
                    }
                },

                closeOverlay: () => dom('overlay-modal').style.display = 'none',

                systemReboot: () => {
                    if(dom('override-key').value.toLowerCase() === CONFIG.RECOVERY) {
                        localStorage.removeItem(CONFIG.STORAGE);
                        location.reload();
                    } else {
                        beep(100, 500, 'sawtooth');
                        alert("ERROR: ACCESS DENIED. INTRUDER DETECTED.");
                    }
                }
            };
        })();

        // [NEURAL CANVAS INTERFACE]
        const canvas = dom('neural-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = Array(70).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5
            }));
        }

        function animateCanvas() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.strokeStyle = "rgba(0, 242, 255, 0.1)";
            
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx *= -1;
                if(d.y<0 || d.y>canvas.height) d.vy *= -1;
                
                ctx.beginPath(); ctx.arc(d.x, d.y, 1.5, 0, Math.PI*2); ctx.fill();
                
                for(let j=i+1; j<dots.length; j++) {
                    let dist = Math.hypot(d.x-dots[j].x, d.y-dots[j].y);
                    if(dist < 150) {
                        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(dots[j].x, dots[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); animateCanvas();

        window.onload = () => {
            const saved = localStorage.getItem('ayu_titan_v3');
            if(saved) engine.renderLock(saved);
        };
    </script>
</body>
</html>
