<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Recovery - Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37;
            --error-red: #ff3e3e;
            --bg-dark: #0f0f0f;
            --panel-bg: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Kanit', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* --- Loading Overlay --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .progress-container {
            width: 300px; height: 4px; background: #222;
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }

        #progress-bar {
            width: 0%; height: 100%; background: var(--primary-gold);
            box-shadow: 0 0 15px var(--primary-gold);
            transition: width 0.1s linear;
        }

        #status-text {
            font-family: 'Courier Prime', monospace;
            font-size: 0.9rem; color: var(--primary-gold);
        }

        /* --- Main Website Structure (Skeleton) --- */
        .container {
            max-width: 800px; margin: 0 auto; padding: 20px;
            opacity: 0.3; /* เค้าโครงจางๆ */
            transition: all 0.5s ease;
        }

        header {
            height: 60px; border-bottom: 2px solid #333;
            margin-bottom: 30px; display: flex; align-items: center;
        }

        .skeleton-title {
            width: 200px; height: 25px; background: #222; border-radius: 5px;
        }

        .content-box {
            background: var(--panel-bg); border: 1px solid #333;
            padding: 20px; border-radius: 15px; min-height: 300px;
            position: relative;
        }

        /* --- Glitch & Data Loss Effects --- */
        .data-text {
            color: #aaa; line-height: 1.6;
            transition: filter 0.3s ease, opacity 1s ease;
        }

        .system-failure {
            color: var(--error-red) !important;
            text-shadow: 0 0 10px var(--error-red);
            filter: blur(2px);
            opacity: 0.2;
        }

        #error-popup {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid var(--error-red);
            padding: 20px; text-align: center;
            display: none; z-index: 5000;
            backdrop-filter: blur(5px);
        }

        .terminal-cursor {
            display: inline-block; width: 10px; height: 18px;
            background: var(--primary-gold); animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        /* สุ่มการสั่นของหน้าจอ */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-2px, 0px); }
            40% { transform: translate(2px, -1px); }
            60% { transform: translate(-1px, 2px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <div id="status-text">INITIALIZING DATA RECOVERY... 0%</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div style="margin-top: 10px; font-size: 0.7rem; color: #444;">ID: CONAN_SYS_772</div>
    </div>

    <div id="error-popup">
        <h2 style="margin:0; font-size: 1.2rem;">CRITICAL DATA LOSS</h2>
        <p style="font-size: 0.8rem;">FAILED TO LOAD SECTOR 0x00412</p>
    </div>

    <div class="container" id="main-ui">
        <header>
            <div class="skeleton-title" id="web-title"></div>
        </header>
        
        <div class="content-box">
            <div id="content-body" class="data-text">
                กำลังดึงข้อมูลฐานข้อมูลคดีล่าสุด...<br>
                เชื่อมต่อเซิร์ฟเวอร์สำนักงานนักสืบโมริ...<br>
                ยืนยันตัวตน: Edogawa Conan...
            </div>
            
            <div style="margin-top: 50px; display: flex; gap: 10px;">
                <div style="width: 80px; height: 80px; background: #222; border-radius: 10px;"></div>
                <div style="flex:1;">
                    <div style="width: 100%; height: 15px; background: #222; margin-bottom: 8px;"></div>
                    <div style="width: 80%; height: 15px; background: #222;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const loaderScreen = document.getElementById('loader-screen');
        const contentBody = document.getElementById('content-body');
        const mainUI = document.getElementById('main-ui');
        const errorPopup = document.getElementById('error-popup');

        let progress = 0;

        // ฟังก์ชันโหลดข้อมูล 1-100
        const loading = setInterval(() => {
            progress += Math.floor(Math.random() * 3) + 1;
            if (progress > 100) progress = 100;

            progressBar.style.width = progress + '%';
            statusText.innerText = `RECOVERING DATA... ${progress}%`;

            if (progress === 100) {
                clearInterval(loading);
                setTimeout(triggerCrash, 800); // เมื่อถึง 100% ให้หน่วงเวลาแป๊บหนึ่งแล้วพัง
            }
        }, 50);

        function triggerCrash() {
            // 1. หน้าจอเริ่มสั่น
            document.body.classList.add('shake');
            statusText.innerText = "ERROR: BUFFER OVERFLOW";
            statusText.style.color = "#ff3e3e";
            progressBar.style.background = "#ff3e3e";

            setTimeout(() => {
                // 2. หน้าโหลดหายไป เห็นเค้าโครงหน้าเว็บ
                loaderScreen.style.display = 'none';
                mainUI.style.opacity = '1';
                document.body.classList.remove('shake');

                // 3. ข้อมูลในหน้าเว็บเริ่มหายและกลายเป็น Error
                setTimeout(() => {
                    contentBody.innerHTML = "D@t# L0ss... [REDACTED] ... NULL ...";
                    contentBody.classList.add('system-failure');
                    errorPopup.style.display = 'block';
                    
                    // 4. เค้าโครงบางส่วนจางหายไป เหลือแต่โครงสร้างเปล่าๆ
                    setTimeout(() => {
                        mainUI.style.filter = "grayscale(100%) contrast(50%)";
                        console.error("FATAL ERROR: Module 'Data_Display' not found.");
                    }, 1500);
                }, 1000);

            }, 1000);
        }
    </script>
</body>
</html>
