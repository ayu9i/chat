<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury QR Generator | Trial Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Prompt:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e1e1e 0%, #000 100%);
            font-family: 'Prompt', sans-serif;
            color: #fff;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--gold);
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-bottom: 2px solid #fff;
            letter-spacing: 1px;
        }

        #qrcode {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .status-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 1.5rem;
            font-weight: 200;
        }

        canvas {
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QR LUXE</h1>
        <div class="input-group">
            <input type="text" id="text" placeholder="พิมพ์ข้อความที่นี่..." oninput="generateQR()">
        </div>
        
        <div id="qrcode"></div>
        
        <p class="status-text">พิมพ์ "โคนัน" หรือข้อความที่คุณต้องการด้านบนได้เลย</p>
    </div>

    <script>
        const qrContainer = document.getElementById("qrcode");
        const qrInput = document.getElementById("text");

        const qrcode = new QRCode(qrContainer, {
            text: "Welcome",
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generateQR() {
            const data = qrInput.value;
            if (data.trim() === "") {
                qrcode.clear();
                qrcode.makeCode("Welcome");
            } else {
                qrcode.makeCode(data);
            }
        }
    </script>
</body>
</html>
