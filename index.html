<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL ERROR | HACKED</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --hacker-green: #00FF41; 
            --bg-black: #000;
            --system-blue: #00ccff;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier Prime', monospace;
        }

        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
        }

        /* --- เลเยอร์กู้ข้อมูลสำเร็จ (หลอกให้ดีใจ) --- */
        #mockupChat {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 5000; display: none;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .chat-box-mock {
            width: 350px; height: 500px; border: 2px solid #d4af37;
            border-radius: 20px; background: #000; position: relative;
        }
        .recovery-success {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 204, 255, 0.9); color: white;
            padding: 15px 30px; border-radius: 10px; font-weight: bold;
            box-shadow: 0 0 20px var(--system-blue);
            z-index: 5001; text-align: center; font-family: 'Kanit';
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .hacker-overlay {
            position: relative; z-index: 2; text-align: center;
            background: rgba(0, 0, 0, 0.8); padding: 40px;
            border: 2px solid var(--hacker-green);
            box-shadow: 0 0 20px var(--hacker-green);
            max-width: 90%; animation: flicker 0.1s infinite;
        }

        /* ข้อความสีแดงตอนโดนแฮ็กซ้ำ */
        #overrideMsg {
            color: #ff0000; font-weight: bold; display: none;
            position: fixed; top: 20px; z-index: 10000; font-size: 1.2rem;
            text-shadow: 0 0 10px red;
        }

        .status-msg {
            color: var(--hacker-green); font-size: 1.5rem;
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 5px; margin-bottom: 20px;
        }

        .warning-text {
            color: #ff0000; font-size: 1rem; margin-top: 10px;
            border-top: 1px solid #ff0000; padding-top: 10px;
        }

        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }

        #loginOverlay, #chatWindow, #customAlert { display: none !important; }
    </style>
</head>
<body>

    <div id="blackout"></div>
    <div id="overrideMsg">! CRITICAL: OVERRIDDEN BY EXTERNAL SOURCE !</div>

    <div id="mockupChat">
        <div class="recovery-success">
            กู้คืนข้อมูลสำเร็จ 100%<br>
            <span style="font-size: 0.7rem;">SYSTEM RECOVERED</span>
        </div>
        <div class="chat-box-mock">
            <div style="background:#d4af37; height:40px; border-radius:18px 18px 0 0;"></div>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="hacker-overlay" id="hackerUI">
        <div class="status-msg">SYSTEM HACKED</div>
        <div style="color: #00FF41; font-size: 0.8rem;">
            ACCESS DENIED... BYPASSING SECURITY...<br>
            ENCRYPTING DATABASE... 100% DONE<br>
            DELETING CONAN_ASSISTANT_V2.SYS
        </div>
        <div class="warning-text">CRITICAL ERROR: CONNECTION LOST</div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const blackout = document.getElementById('blackout');
        const mockup = document.getElementById('mockupChat');
        const hackerUI = document.getElementById('hackerUI');
        const overrideMsg = document.getElementById('overrideMsg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "CONAN01SHINICHIAPTX4869KID1412ERRORHACKED010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px 'Courier Prime'";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        function triggerGlitchLoop() {
            // 1. เริ่มอาการจอดับ
            setTimeout(() => {
                blackout.style.display = 'block';
                
                // 2. จอติดขึ้นมาพร้อมสถานะ "กู้ข้อมูลสำเร็จ" (แวบขึ้นมา 0.8 วินาที)
                setTimeout(() => {
                    blackout.style.display = 'none';
                    mockup.style.display = 'flex';
                    hackerUI.style.display = 'none';
                    canvas.style.opacity = '0';

                    // 3. แวบหนึ่งขึ้นคำเตือนสีแดงว่าโดน Override
                    setTimeout(() => {
                        overrideMsg.style.display = 'block';
                        
                        // 4. กลับสู่สถานะโดนแฮ็กเหมือนเดิม
                        setTimeout(() => {
                            overrideMsg.style.display = 'none';
                            mockup.style.display = 'none';
                            hackerUI.style.display = 'block';
                            canvas.style.opacity = '1';
                            
                            // วนลูปสุ่มเวลา 7-12 วินาที
                            setTimeout(triggerGlitchLoop, Math.random() * 5000 + 7000);
                        }, 400); // แสดงหน้ากู้ข้อมูลแค่แป๊บเดียว

                    }, 800); // ให้ดีใจ 0.8 วินาทีก่อนขึ้นสีแดง

                }, 1200); // ดับไป 1.2 วินาที

            }, 6000); // เริ่มหลังเปิดหน้าเว็บ 6 วินาที
        }

        window.onload = triggerGlitchLoop;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
