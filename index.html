<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_CRITICAL_FAILURE</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #0f0;
        }

        .container {
            width: 80%;
            max-width: 800px;
        }

        .terminal-header {
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-msg {
            color: #f00;
            text-shadow: 0 0 5px #f00;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        .typing-text {
            border-right: 2px solid #0f0;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .threat-box {
            width: 90%;
            max-width: 700px;
            border: 2px solid #f00;
            padding: 30px;
            background: rgba(20,0,0,0.9);
            box-shadow: 0 0 20px #f00;
            text-align: left;
        }

        .progress-bar-bg {
            width: 100%;
            background: #222;
            height: 12px;
            margin-top: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            background: #f00;
            height: 100%;
            box-shadow: 0 0 10px #f00;
            animation: fillProgress 60s linear forwards; /* วิ่งเต็มภายใน 60 วินาที */
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div id="main-content" class="container">
        <div class="terminal-header">
            [ REMOTE_HOST: GITHUB_SERVER ]<br>
            [ STATUS: DISCONNECTED ]
        </div>

        <div class="glitch">
            <p class="error-msg">>>> CRITICAL_ERROR: REPOSITORY_ENCRYPTED <<<</p>
            <p id="log"></p>
            <p id="command-line">root@system:~# <span class="typing-text" id="typing"></span></p>
        </div>
    </div>

    <script>
        const logs = [
            "Detecting unauthorized access...",
            "Firewall breached...",
            "Encrypting project files...",
            "Disconnecting database...",
            "System going offline..."
        ];

        const typingElement = document.getElementById('typing');
        const logElement = document.getElementById('log');
        const mainContent = document.getElementById('main-content');
        let logIndex = 0;

        function addLog() {
            if (logIndex < logs.length) {
                logElement.innerHTML += `[ OK ] ${logs[logIndex]}<br>`;
                logIndex++;
                setTimeout(addLog, 800);
            } else {
                startTyping();
            }
        }

        function startTyping() {
            const text = "shutdown -h now --force";
            let charIndex = 0;
            
            const timer = setInterval(() => {
                if (charIndex < text.length) {
                    typingElement.innerHTML += text.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(timer);
                    setTimeout(startCountdown, 1500);
                }
            }, 100);
        }

        function startCountdown() {
            let count = 3;
            mainContent.innerHTML = `
                <div style="text-align:center;">
                    <h1 style="color:red; font-size: 50px;">SYSTEM OFFLINE</h1>
                    <h2 id="countdown" style="color:white; font-size: 80px;">3</h2>
                </div>`;

            const countdownElement = document.getElementById('countdown');
            const countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownElement.innerText = count;
                } else {
                    clearInterval(countdownTimer);
                    executeBoom();
                }
            }, 1000);
        }

        function executeBoom() {
            document.body.style.backgroundColor = "white";
            mainContent.innerHTML = `<h1 style="color:black; font-size: 100px; font-weight: bold;">ตู้ม!</h1>`;
            
            setTimeout(() => {
                document.body.style.backgroundColor = "black";
                showFinalTermination();
            }, 250);
        }

        function showFinalTermination() {
            document.body.innerHTML = `
                <div class="scanline"></div>
                <div class="threat-box">
                    <h1 style="color:#f00; text-align:center; letter-spacing: 5px; margin-top:0;">[ ACCESS REVOKED ]</h1>
                    <hr style="border: 1px solid #f00;">
                    
                    <p style="color:#ff4444; font-size: 1.1rem; line-height: 1.6;">
                        <span style="background:#f00; color:#fff; padding: 2px 8px; font-weight: bold;">FINAL WARNING:</span><br><br>
                        บัญชีนี้ถูกระงับเนื่องจากตรวจพบกิจกรรมที่ผิดปกติ ระบบความปลอดภัยของ Google เริ่มกระบวนการล้างข้อมูล
                    </p>
                    
                    <div style="background:#111; padding: 15px; border-left: 5px solid #f00; margin: 20px 0;">
                        <p style="color:#0f0; margin: 0; font-family: monospace; line-height: 1.8;">
                            > STATUS: <span style="color:#f00; font-weight:bold;">DELETION IN PROGRESS</span><br>
                            > AUTHORITY: GOOGLE SECURITY OPS<br>
                            > ACTION: WIPE ALL DIRECTORIES<br>
                            > TIME REMAINING: <span id="timer" style="color:#fff; font-weight:bold; font-size: 1.2rem;">01:00</span>
                        </p>
                    </div>

                    <p style="color:#ccc; text-align: center; font-style: italic; border: 1px dashed #444; padding: 10px;">
                        "ไฟล์และข้อมูลสำรองทั้งหมดจะถูกเผิกถอนโดยสมบูรณ์ภายใน 1 นาที"
                    </p>
                    
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                    <p id="status-text" style="color:#555; font-size: 0.85rem; text-align: right; margin-top: 8px;">Purging data: 0%...</p>
                </div>
            `;

            // เริ่มตัวนับถอยหลัง 1 นาที (60 วินาที)
            let seconds = 60;
            const timerDisplay = document.getElementById('timer');
            const statusText = document.getElementById('status-text');
            
            const finalCount = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
                // สุ่มตัวเลขเปอร์เซ็นต์การลบ
                let percent = Math.floor(((60 - seconds) / 60) * 100);
                statusText.innerText = `Purging data: ${percent}%...`;

                if (seconds <= 0) {
                    clearInterval(finalCount);
                    document.body.innerHTML = "<h1 style='color:red; font-size: 3rem;'>DATA PURGED.</h1>";
                }
            }, 1000);
        }

        setTimeout(addLog, 1000);
    </script>
</body>
</html>
