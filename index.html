<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | DATA RECOVERY MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --conan-blue: #004a99;
            --terminal-green: #00ff41;
            --warning-amber: #ffb000;
            --bg-black: #050505;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Courier Prime', monospace;
            color: var(--terminal-green);
            overflow: hidden;
        }

        /* --- Background Grid (ให้ดูเหมือนจอคอมพิวเตอร์เก่า) --- */
        .scanline {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 100; pointer-events: none;
        }

        .container {
            display: flex; flex-direction: column;
            height: 100vh; padding: 20px; box-sizing: border-box;
        }

        /* --- Header: Status --- */
        .header {
            border: 1px solid var(--terminal-green);
            padding: 10px 20px; margin-bottom: 20px;
            display: flex; justify-content: space-between;
            background: rgba(0, 255, 65, 0.05);
        }

        /* --- Recovery Progress Area --- */
        .recovery-zone {
            flex: 1; display: flex; flex-direction: column; gap: 20px;
        }

        .progress-block {
            border: 1px solid #333; padding: 20px; border-radius: 5px;
        }

        .bar-container {
            width: 100%; height: 20px; background: #111;
            border: 1px solid var(--terminal-green); position: relative;
            margin-top: 10px;
        }

        #main-bar {
            width: 0%; height: 100%; background: var(--terminal-green);
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--terminal-green);
        }

        /* --- Console/Log Area --- */
        #console-log {
            flex: 1; background: #000; border: 1px solid #333;
            padding: 15px; overflow-y: auto; font-size: 0.85rem;
            color: var(--terminal-green); line-height: 1.4;
        }

        .log-entry { margin-bottom: 5px; }
        .log-error { color: #ff3e3e; }
        .log-warn { color: var(--warning-amber); }
        .log-success { color: #fff; text-shadow: 0 0 5px #fff; }

        /* --- เค้าโครงเดิมที่กำลังกู้คืน (Ghost UI) --- */
        .ghost-ui {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 200px; border: 1px dashed #444;
            opacity: 0.3; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 0.6rem;
        }

        /* Animation กะพริบ */
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="container">
        <div class="header">
            <div>SYSTEM: <span class="blink">RECOVERY_MODE</span></div>
            <div>STATION: BEIKA_STATION_01</div>
            <div id="clock">00:00:00</div>
        </div>

        <div class="recovery-zone">
            <div class="progress-block">
                <div style="display: flex; justify-content: space-between;">
                    <span>RESTORING DATABASE: [CONAN_CASE_FILES]</span>
                    <span id="percent-text">0%</span>
                </div>
                <div class="bar-container">
                    <div id="main-bar"></div>
                </div>
            </div>

            <div id="console-log">
                <div class="log-entry">>> Initializing Detective System v4.8.6.9...</div>
                <div class="log-entry">>> Connecting to Mouri Detective Agency Server...</div>
                <div class="log-entry log-success">>> Connection Established.</div>
                <div class="log-entry">>> Accessing encrypted partition...</div>
            </div>
        </div>

        <div class="ghost-ui">
            <div style="width: 80%; height: 10px; background: #222; margin-bottom: 10px;"></div>
            <div style="width: 50px; height: 50px; border: 1px solid #222; border-radius: 50%;"></div>
            <p style="margin-top: 10px; color: #222;">UI_SKELETON_01</p>
        </div>
    </div>

    <script>
        const mainBar = document.getElementById('main-bar');
        const percentText = document.getElementById('percent-text');
        const consoleLog = document.getElementById('console-log');
        const clock = document.getElementById('clock');

        let progress = 0;
        const logData = [
            { t: ">> Scanning Sector 0x441...", type: "normal" },
            { t: ">> Found Fragmented File: 'Ran_Mouri_Memory.dat'", type: "success" },
            { t: ">> WARNING: Sector 0x112 corrupted.", type: "warn" },
            { t: ">> Attempting Bit-level repair...", type: "normal" },
            { t: ">> ERROR: APTX4869_Inhibition_Logic not found.", type: "error" },
            { t: ">> Bypassing security protocol...", type: "normal" },
            { t: ">> Fetching assets: profile_pic.jpg, chat_history.db", type: "normal" },
            { t: ">> Reconstructing UI Elements...", type: "success" }
        ];

        // อัปเดตเวลา
        setInterval(() => {
            const now = new Date();
            clock.innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                             now.getMinutes().toString().padStart(2, '0') + ":" + 
                             now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        // ระบบกู้ข้อมูล
        const recoveryInterval = setInterval(() => {
            if (progress < 100) {
                // สุ่มเพิ่ม % แบบไม่สม่ำเสมอให้ดูสมจริง
                progress += Math.random() > 0.8 ? 0.5 : 2;
                if (progress > 100) progress = 100;
                
                mainBar.style.width = progress + "%";
                percentText.innerText = Math.floor(progress) + "%";

                // สุ่มเพิ่ม Log ตามความคืบหน้า
                if (Math.random() > 0.95) {
                    addLog();
                }
            } else {
                const finalLog = document.createElement('div');
                finalLog.className = 'log-entry log-error blink';
                finalLog.innerText = ">> CRITICAL FAILURE: DATA OVERWRITTEN BY UNKNOWN SOURCE.";
                consoleLog.appendChild(finalLog);
                clearInterval(recoveryInterval);
            }
        }, 150);

        function addLog() {
            const data = logData[Math.floor(Math.random() * logData.length)];
            const div = document.createElement('div');
            div.className = 'log-entry ' + (data.type === 'error' ? 'log-error' : (data.type === 'warn' ? 'log-warn' : (data.type === 'success' ? 'log-success' : '')));
            div.innerText = data.t;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        // เพิ่ม Log ตั้งต้น
        setTimeout(() => addLog(), 1000);
        setTimeout(() => addLog(), 2500);
        setTimeout(() => addLog(), 4000);
    </script>
</body>
</html>
