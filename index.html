<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE: ACCESS_DENIED</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #0f0;
        }

        .container {
            width: 80%;
            max-width: 800px;
        }

        .terminal-header {
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-msg {
            color: #f00;
            text-shadow: 0 0 5px #f00;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        .typing-text {
            border-right: 2px solid #0f0;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .glitch {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="terminal-header">
            [ REMOTE_HOST: GITHUB_SERVER ]<br>
            [ STATUS: DISCONNECTED ]
        </div>

        <div class="glitch">
            <p class="error-msg">>>> CRITICAL_ERROR: REPOSITORY_ENCRYPTED <<<</p>
            <p id="log"></p>
            <p id="command-line">root@system:~# <span class="typing-text" id="typing"></span></p>
        </div>
    </div>

    <script>
        const logs = [
            "Detecting unauthorized access...",
            "Firewall breached...",
            "Encrypting project files...",
            "Disconnecting database...",
            "System going offline..."
        ];

        const typingElement = document.getElementById('typing');
        const logElement = document.getElementById('log');
        let logIndex = 0;

        function addLog() {
            if (logIndex < logs.length) {
                logElement.innerHTML += `[ OK ] ${logs[logIndex]}<br>`;
                logIndex++;
                setTimeout(addLog, 800);
            } else {
                startTyping();
            }
        }

        function startTyping() {
            const text = "shutdown -h now --force";
            let charIndex = 0;
            
            const timer = setInterval(() => {
                if (charIndex < text.length) {
                    typingElement.innerHTML += text.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.body.innerHTML = "<h1 style='color:red; text-align:center; width:100%;'>SYSTEM OFFLINE</h1>";
                    }, 2000);
                }
            }, 100);
        }

        // Start the sequence
        setTimeout(addLog, 1000);
    </script>
</body>
</html>
