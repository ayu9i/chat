<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury QR & Image Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Prompt:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0f0f0f; }
        body {
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            font-family: 'Prompt', sans-serif; color: white; text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2); padding: 30px;
            border-radius: 30px; max-width: 400px; width: 90%;
        }
        input {
            width: 100%; padding: 12px 0; background: transparent; border: none;
            border-bottom: 1px solid var(--gold); color: #fff; font-size: 1.2rem;
            text-align: center; outline: none; margin-bottom: 20px;
        }
        #qrcode {
            background: #fff; padding: 15px; border-radius: 15px;
            display: inline-block; margin-bottom: 20px;
        }
        .btn-download {
            background: linear-gradient(45deg, #D4AF37, #f2d06b);
            color: #000; border: none; padding: 12px 25px;
            border-radius: 50px; font-weight: 600; cursor: pointer;
            transition: 0.3s; width: 100%; text-decoration: none; display: block;
        }
        .btn-download:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        #view-section { display: none; }
        .result-img { width: 100%; border-radius: 15px; margin-top: 15px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div id="create-section" class="card">
        <h1 style="color: var(--gold); font-family: Montserrat; letter-spacing: 3px;">QR GENERATOR</h1>
        <input type="text" id="qr-input" placeholder="พิมพ์ข้อความ (เช่น โคนัน)..." oninput="updateQR()">
        <div id="qrcode"></div>
        <button class="btn-download" onclick="downloadQR()">DOWNLOAD QR CODE</button>
    </div>

    <div id="view-section" class="card">
        <h1 id="display-text" style="color: var(--gold);"></h1>
        <p>สแกนสำเร็จ! นี่คือข้อความของคุณ</p>
        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=500" class="result-img">
        <p id="sub-text" style="margin-top:10px; font-weight: bold; font-size: 1.5rem;"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const textParam = urlParams.get('text');

        // ตรวจสอบว่าเป็นการ "สแกนมา" หรือ "กำลังสร้าง"
        if (textParam) {
            document.getElementById('create-section').style.display = 'none';
            document.getElementById('view-section').style.display = 'block';
            document.getElementById('display-text').innerText = "RESULT";
            document.getElementById('sub-text').innerText = textParam;
        }

        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 200, height: 200,
            colorDark : "#000000", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updateQR() {
            const val = document.getElementById("qr-input").value;
            // สร้าง Link ที่จะให้คนสแกนแล้ววิ่งมาหน้าเดิมแต่พ่วง Parameter ไปด้วย
            const currentUrl = window.location.href.split('?')[0];
            const finalUrl = currentUrl + "?text=" + encodeURIComponent(val);
            qrcode.makeCode(finalUrl);
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            const link = document.createElement('a');
            link.download = 'my-luxury-qr.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
