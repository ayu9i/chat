<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ULTIMATE BOMB 💣</title>
    <style>
        :root {
            --danger: #ff0000;
            --success: #00ff44;
            --bg: #0a0a0a;
            --panel: #222;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        #app {
            background: var(--panel);
            padding: 40px;
            border: 4px solid #444;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }

        .screen {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px solid #333;
        }

        .status-text {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 0;
        }

        .wire-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .wire-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wire-cable {
            width: 12px;
            height: 100px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: inset -3px 0 5px rgba(0,0,0,0.5);
        }

        .wire-cable:hover {
            transform: scale(1.1);
            filter: brightness(1.3);
            box-shadow: 0 0 15px currentColor;
        }

        .wire-cable.cut {
            height: 40px;
            background: #111 !important;
            cursor: default;
            transform: translateY(-10px);
            box-shadow: none;
        }

        .input-group {
            margin-top: 25px;
            animation: fadeIn 1s;
        }

        input {
            background: #111;
            border: 2px solid #444;
            color: var(--success);
            padding: 12px;
            border-radius: 5px;
            font-size: 1.1rem;
            width: 70%;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            background: var(--success);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* สีสายไฟ */
        .color-0 { background: #ff3e3e; } .color-1 { background: #3e8bff; }
        .color-2 { background: #3eff8b; } .color-3 { background: #f4ff3e; }
        .color-4 { background: #ff3ef4; } .color-5 { background: #3efff4; }
        .color-6 { background: #ffffff; } .color-7 { background: #ffa63e; }
        .color-8 { background: #8e3eff; } .color-9 { background: #555555; }
    </style>
</head>
<body>

    <div id="app">
        <div id="game-layer">
            <div class="screen">
                <p id="display-text" class="status-text" style="color: var(--danger);">00:30</p>
            </div>
            <div class="wire-grid" id="wire-grid"></div>
            <p style="color: #888;">เลือกระหว่าง "รอด" หรือ "บึ้ม"</p>
        </div>

        <div id="lock-layer" style="display: none;">
            <div class="screen">
                <p id="lock-title" class="status-text"></p>
            </div>
            <p id="lock-desc"></p>
            <div class="input-group">
                <input type="text" id="passcode" placeholder="ENTER CODE">
                <br>
                <button onclick="unlock()">ACTIVATE SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        const MASTER_CODE = "gurabud";
        const STORAGE_KEY = "bomb_system_state";
        
        const wireGrid = document.getElementById('wire-grid');
        const gameLayer = document.getElementById('game-layer');
        const lockLayer = document.getElementById('lock-layer');
        const lockTitle = document.getElementById('lock-title');
        const lockDesc = document.getElementById('lock-desc');
        const displayText = document.getElementById('display-text');

        // สุ่มสายที่ถูกต้อง
        let correctWire = Math.floor(Math.random() * 10);

        function checkState() {
            const state = localStorage.getItem(STORAGE_KEY);
            if (state === 'exploded') {
                showLock('BOOM!', 'อุปกรณ์ถูกทำลายถาวร', '#ff0000');
            } else if (state === 'cleared') {
                showLock('CLEAR', 'ภารกิจสำเร็จ ระบบล็อคชั่วคราว', '#00ff44');
            } else {
                renderWires();
            }
        }

        function renderWires() {
            wireGrid.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'wire-wrapper';
                const wire = document.createElement('div');
                wire.className = `wire-cable color-${i}`;
                wire.onclick = () => cutWire(i, wire);
                wrap.appendChild(wire);
                wireGrid.appendChild(wrap);
            }
        }

        function cutWire(id, el) {
            if (id === correctWire) {
                localStorage.setItem(STORAGE_KEY, 'cleared');
                showLock('CLEAR', 'รอดตาย! ระบบเข้าสู่โหมดปลอดภัย', '#00ff44');
            } else {
                localStorage.setItem(STORAGE_KEY, 'exploded');
                showLock('BOOM!', 'สายผิด! ระเบิดทำงานแล้ว', '#ff0000');
            }
        }

        function showLock(title, desc, color) {
            gameLayer.style.display = 'none';
            lockLayer.style.display = 'block';
            lockTitle.innerText = title;
            lockTitle.style.color = color;
            lockDesc.innerText = desc;
            document.body.style.backgroundColor = (title === 'BOOM!') ? '#1a0000' : '#001a00';
        }

        function unlock() {
            const input = document.getElementById('passcode').value;
            if (input.toLowerCase() === MASTER_CODE) {
                localStorage.removeItem(STORAGE_KEY);
                alert("SYSTEM REBOOTED...");
                location.reload();
            } else {
                alert("WRONG CODE!");
            }
        }

        checkState();
    </script>
</body>
</html>
